<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debug Flappy Kiro</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f0f0f0;
    }
    #debugCanvas {
      border: 2px solid #000;
      background: #87CEEB;
      display: block;
      margin: 20px auto;
    }
    #log {
      background: #fff;
      border: 1px solid #ccc;
      padding: 10px;
      max-height: 400px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 12px;
    }
    .error { color: red; }
    .success { color: green; }
    .info { color: blue; }
  </style>
</head>
<body>
  <h1>Flappy Kiro Debug</h1>
  <canvas id="debugCanvas" width="480" height="640"></canvas>
  <div id="log"></div>
  
  <script type="module">
    const log = document.getElementById('log');
    
    function addLog(message, type = 'info') {
      const div = document.createElement('div');
      div.className = type;
      div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
      console.log(message);
    }
    
    addLog('Starting debug...', 'info');
    
    try {
      // Test canvas
      const canvas = document.getElementById('debugCanvas');
      const ctx = canvas.getContext('2d');
      
      if (!ctx) {
        addLog('ERROR: Cannot get 2D context', 'error');
      } else {
        addLog('Canvas context OK', 'success');
        
        // Test basic drawing
        ctx.fillStyle = '#87CEEB';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        addLog('Background drawn', 'success');
        
        // Test text rendering
        ctx.fillStyle = '#FFFFFF';
        ctx.strokeStyle = '#000000';
        ctx.lineWidth = 4;
        ctx.font = '48px "Press Start 2P", monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        ctx.strokeText('TEST', canvas.width / 2, canvas.height / 2);
        ctx.fillText('TEST', canvas.width / 2, canvas.height / 2);
        addLog('Text drawn', 'success');
        
        // Test module imports
        addLog('Testing module imports...', 'info');
        
        import('./gameState.js').then(module => {
          addLog('✓ gameState.js loaded', 'success');
          const state = new module.GameState();
          addLog(`  Initial state: ${state.getCurrentState()}`, 'info');
        }).catch(err => {
          addLog(`✗ gameState.js failed: ${err.message}`, 'error');
        });
        
        import('./renderer.js').then(module => {
          addLog('✓ renderer.js loaded', 'success');
          const renderer = new module.Renderer(canvas, ctx);
          addLog('  Renderer created', 'info');
        }).catch(err => {
          addLog(`✗ renderer.js failed: ${err.message}`, 'error');
        });
        
        import('./physics.js').then(module => {
          addLog('✓ physics.js loaded', 'success');
        }).catch(err => {
          addLog(`✗ physics.js failed: ${err.message}`, 'error');
        });
        
        import('./ghosty.js').then(module => {
          addLog('✓ ghosty.js loaded', 'success');
        }).catch(err => {
          addLog(`✗ ghosty.js failed: ${err.message}`, 'error');
        });
        
        import('./wall.js').then(module => {
          addLog('✓ wall.js loaded', 'success');
        }).catch(err => {
          addLog(`✗ wall.js failed: ${err.message}`, 'error');
        });
        
        import('./wallManager.js').then(module => {
          addLog('✓ wallManager.js loaded', 'success');
        }).catch(err => {
          addLog(`✗ wallManager.js failed: ${err.message}`, 'error');
        });
        
        import('./collision.js').then(module => {
          addLog('✓ collision.js loaded', 'success');
        }).catch(err => {
          addLog(`✗ collision.js failed: ${err.message}`, 'error');
        });
        
        import('./scoreTracker.js').then(module => {
          addLog('✓ scoreTracker.js loaded', 'success');
        }).catch(err => {
          addLog(`✗ scoreTracker.js failed: ${err.message}`, 'error');
        });
        
        import('./assetLoader.js').then(module => {
          addLog('✓ assetLoader.js loaded', 'success');
        }).catch(err => {
          addLog(`✗ assetLoader.js failed: ${err.message}`, 'error');
        });
        
        import('./audioManager.js').then(module => {
          addLog('✓ audioManager.js loaded', 'success');
        }).catch(err => {
          addLog(`✗ audioManager.js failed: ${err.message}`, 'error');
        });
        
        import('./input.js').then(module => {
          addLog('✓ input.js loaded', 'success');
        }).catch(err => {
          addLog(`✗ input.js failed: ${err.message}`, 'error');
        });
      }
    } catch (error) {
      addLog(`FATAL ERROR: ${error.message}`, 'error');
      addLog(error.stack, 'error');
    }
  </script>
</body>
</html>
