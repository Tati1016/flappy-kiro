<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Render Test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    canvas {
      border: 4px solid #fff;
      background: #87CEEB;
    }
  </style>
</head>
<body>
  <canvas id="testCanvas" width="480" height="640"></canvas>
  
  <script type="module">
    import { Renderer } from './renderer.js';
    import { GameState } from './gameState.js';
    import { Ghosty } from './ghosty.js';
    
    const canvas = document.getElementById('testCanvas');
    const ctx = canvas.getContext('2d');
    
    console.log('Canvas:', canvas);
    console.log('Context:', ctx);
    
    // Wait for fonts to load
    await document.fonts.ready;
    console.log('Fonts ready');
    
    // Create components
    const renderer = new Renderer(canvas, ctx);
    const gameState = new GameState();
    const ghosty = new Ghosty(100, 320, 40, 40);
    
    console.log('Components created');
    console.log('GameState:', gameState.getCurrentState());
    console.log('Ghosty:', ghosty);
    
    // Test render
    console.log('Calling renderer.render()...');
    renderer.render(gameState, ghosty, [], 0);
    console.log('Render complete!');
    
    // Add click handler to test state transition
    canvas.addEventListener('click', () => {
      console.log('Canvas clicked');
      if (gameState.isStart()) {
        gameState.setState(GameState.PLAYING);
        console.log('State changed to PLAYING');
      }
      renderer.render(gameState, ghosty, [], 0);
    });
  </script>
</body>
</html>
